name: Wisconsin
options:
  bundleIdPrefix: com.erikrole
  deploymentTarget:
    iOS: "26.0"
  createIntermediateGroups: true
  xcodeVersion: "16"

settings:
  base:
    SWIFT_VERSION: "5.10"
    ENABLE_PREVIEWS: "NO"

targets:
  Wisconsin:
    type: application
    platform: iOS
    deploymentTarget: "26.0"
    bundleId: com.erikrole.Wisconsin
    sources:
      - path: Wisconsin
        excludes:
          - KioskOnly/**
    info:
      path: Wisconsin/Supporting/Info.plist
      properties:
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        UILaunchScreen:
          UIColorName: ""
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
          - UIInterfaceOrientationPortraitUpsideDown
        NSCameraUsageDescription: "Scan gear barcodes and QR codes"
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: false
        NSSupportsLiveActivities: true
        CFBundleURLTypes:
          - CFBundleURLSchemes:
              - wisconsin
        UIAppFonts:
          - Gotham-Black.ttf
          - Gotham-Bold.ttf
    entitlements:
      path: Wisconsin/Wisconsin.entitlements
      properties:
        aps-environment: development
        com.apple.developer.weatherkit: true
    dependencies:
      - sdk: WeatherKit.framework
        embed: false
      - target: WisconsinLiveActivities
    settings:
      base:
        PRODUCT_NAME: Wisconsin
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "17"
        TARGETED_DEVICE_FAMILY: "1,2"
        DEVELOPMENT_TEAM: T26T3G8C7Q
      configs:
        Debug:
          OTHER_SWIFT_FLAGS: "-DDEBUG"

  WisconsinKiosk:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    bundleId: com.erikrole.WisconsinKiosk
    sources:
      - path: Wisconsin/KioskOnly
      - path: Wisconsin/Kiosk
      - path: Wisconsin/Assets.xcassets
      - path: Wisconsin/Resources
    info:
      path: Wisconsin/KioskOnly/Info.plist
      properties:
        UILaunchScreen:
          UIColorName: ""
        UIRequiresFullScreen: true
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        NSCameraUsageDescription: "Scan gear barcodes and QR codes"
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: false
        UIAppFonts:
          - Gotham-Black.ttf
          - Gotham-Bold.ttf
    settings:
      base:
        PRODUCT_NAME: Wisconsin Kiosk
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        TARGETED_DEVICE_FAMILY: "2"
        DEVELOPMENT_TEAM: T26T3G8C7Q
      configs:
        Debug:
          OTHER_SWIFT_FLAGS: "-DDEBUG"

  WisconsinTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - path: WisconsinTests
    dependencies:
      - target: Wisconsin
    settings:
      base:
        GENERATE_INFOPLIST_FILE: "YES"
        PRODUCT_NAME: WisconsinTests
        PRODUCT_BUNDLE_IDENTIFIER: com.erikrole.WisconsinTests
        DEVELOPMENT_TEAM: T26T3G8C7Q

  WisconsinLiveActivities:
    type: app-extension
    platform: iOS
    deploymentTarget: "26.0"
    bundleId: com.erikrole.Wisconsin.LiveActivities
    sources:
      - path: WisconsinLiveActivities
      - path: Wisconsin/LiveActivities/CheckoutReturnActivityAttributes.swift
    info:
      path: WisconsinLiveActivities/Info.plist
      properties:
        CFBundleDisplayName: "Wisconsin Creative Live Activities"
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      base:
        PRODUCT_NAME: WisconsinLiveActivities
        PRODUCT_BUNDLE_IDENTIFIER: com.erikrole.Wisconsin.LiveActivities
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "17"
        DEVELOPMENT_TEAM: T26T3G8C7Q
        SKIP_INSTALL: YES

schemes:
  Wisconsin:
    build:
      targets:
        Wisconsin: all
        WisconsinLiveActivities: all
    test:
      targets:
        - WisconsinTests

  WisconsinKiosk:
    build:
      targets:
        WisconsinKiosk: all
