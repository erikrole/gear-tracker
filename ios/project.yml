name: Wisconsin
options:
  bundleIdPrefix: com.erikrole
  deploymentTarget:
    iOS: "26.0"
  createIntermediateGroups: true
  xcodeVersion: "26.6"

settings:
  base:
    SWIFT_VERSION: "6.0"
    ENABLE_PREVIEWS: "NO"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
    DEVELOPMENT_TEAM: T26T3G8C7Q
    STRING_CATALOG_GENERATE_SYMBOLS: "YES"

targets:
  Wisconsin:
    type: application
    platform: iOS
    deploymentTarget: "26.0"
    bundleId: com.erikrole.Wisconsin
    sources:
      - path: Wisconsin
        excludes:
          - Kiosk/**
          - KioskOnly/**
    info:
      path: Wisconsin/Supporting/Info.plist
      properties:
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        CFBundleDisplayName: "Creative"
        UILaunchScreen:
          UIColorName: LaunchBackground
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
          - UIInterfaceOrientationPortraitUpsideDown
        NSCameraUsageDescription: "Scan gear barcodes and QR codes"
        # Write-only: the app adds checkout return reminders and never reads
        # what is already on your calendar. Not granted to the kiosk target,
        # which has no per-person calendar to write to.
        NSCalendarsWriteOnlyAccessUsageDescription: "Add your gear checkouts to your calendar with a reminder before they are due back"
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: false
        NSSupportsLiveActivities: true
        ITSAppUsesNonExemptEncryption: false
        CFBundleURLTypes:
          - CFBundleURLSchemes:
              - wisconsin
        UIAppFonts:
          - Gotham-Black.ttf
          - Gotham-Bold.ttf
    entitlements:
      path: Wisconsin/Wisconsin.entitlements
      properties:
        aps-environment: production
        com.apple.developer.weatherkit: true
        # Lets overdue-gear alerts and staff nudges break through Focus and Do
        # Not Disturb. The server sets `interruption-level: time-sensitive` on
        # those two paths only; every other push stays at the default level.
        com.apple.developer.usernotifications.time-sensitive: true
    dependencies:
      - sdk: WeatherKit.framework
        embed: false
      - target: WisconsinLiveActivities
    settings:
      base:
        PRODUCT_NAME: Wisconsin Creative
        PRODUCT_MODULE_NAME: Wisconsin
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "22"
        TARGETED_DEVICE_FAMILY: "1,2"
        SWIFT_STRICT_CONCURRENCY: complete
      configs:
        Debug:
          OTHER_SWIFT_FLAGS: "-DDEBUG"

  WisconsinKiosk:
    type: application
    platform: iOS
    deploymentTarget: "26.0"
    bundleId: com.erikrole.WisconsinKiosk
    sources:
      - path: Wisconsin/KioskOnly
      - path: Wisconsin/Kiosk
      - path: Wisconsin/Shared
      - path: Wisconsin/Assets.xcassets
      - path: Wisconsin/Resources
    info:
      path: Wisconsin/KioskOnly/Info.plist
      properties:
        UILaunchScreen:
          UIColorName: ""
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
          - UIInterfaceOrientationPortraitUpsideDown
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
          - UIInterfaceOrientationPortraitUpsideDown
        NSCameraUsageDescription: "Scan gear barcodes and QR codes"
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: false
        UIAppFonts:
          - Gotham-Black.ttf
          - Gotham-Bold.ttf
    settings:
      base:
        PRODUCT_NAME: Wisconsin Kiosk
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        TARGETED_DEVICE_FAMILY: "2"
      configs:
        Debug:
          OTHER_SWIFT_FLAGS: "-DDEBUG"

  WisconsinTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - path: WisconsinTests
    dependencies:
      - target: Wisconsin
    settings:
      base:
        GENERATE_INFOPLIST_FILE: "YES"
        PRODUCT_NAME: WisconsinTests
        PRODUCT_BUNDLE_IDENTIFIER: com.erikrole.WisconsinTests
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Wisconsin Creative.app/Wisconsin Creative"
        BUNDLE_LOADER: "$(TEST_HOST)"

  WisconsinKioskTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - path: WisconsinKioskTests
    dependencies:
      - target: WisconsinKiosk
    settings:
      base:
        GENERATE_INFOPLIST_FILE: "YES"
        PRODUCT_NAME: WisconsinKioskTests
        PRODUCT_BUNDLE_IDENTIFIER: com.erikrole.WisconsinKioskTests
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Wisconsin Kiosk.app/Wisconsin Kiosk"
        BUNDLE_LOADER: "$(TEST_HOST)"

  WisconsinLiveActivities:
    type: app-extension
    platform: iOS
    deploymentTarget: "26.0"
    bundleId: com.erikrole.Wisconsin.LiveActivities
    sources:
      - path: WisconsinLiveActivities
      - path: Wisconsin/LiveActivities/CheckoutReturnActivityAttributes.swift
    info:
      path: WisconsinLiveActivities/Info.plist
      properties:
        CFBundleDisplayName: "Wisconsin Creative Live Activities"
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      base:
        PRODUCT_NAME: WisconsinLiveActivities
        PRODUCT_BUNDLE_IDENTIFIER: com.erikrole.Wisconsin.LiveActivities
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "22"
        SKIP_INSTALL: YES
        SWIFT_STRICT_CONCURRENCY: complete

schemes:
  Wisconsin:
    build:
      targets:
        Wisconsin: all
        WisconsinLiveActivities: all
    test:
      targets:
        - name: WisconsinTests
          randomExecutionOrder: true
      gatherCoverageData: true

  WisconsinKiosk:
    build:
      targets:
        WisconsinKiosk: all
    test:
      targets:
        - name: WisconsinKioskTests
          randomExecutionOrder: true
      gatherCoverageData: true
